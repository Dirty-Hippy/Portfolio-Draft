<!DOCTYPE html>
<html>
    <head>
        <title>stupidscrewaround</title>
        <link href="style.css" rel="stylesheet" type="text/css"/>
        <script>
        function changeColor(){
            document.getElementById('text').style.color='cyan';
        }
        function draw(){
            const canvas= document.getElementById('canvas');
            const ctx= canvas.getContext('2d');
            //
            ctx.fillRect(20, 20, 20, 20);
            ctx.fillRect(0, 0, 20, 20, 'red');
            ctx.beginPath();
            ctx.moveTo(0, 0)
            ctx.lineTo(50, 50);
            ctx.lineTo(50, 100);
            ctx.lineTo(0, 0);
            ctx.fill();
            

        }
        </script>
    </head>
    <body>
        <h1>Stupid Screw Around</h1>
        <button onclick="document.getElementById('tree').src='Images/tree.jpg'">
             Revert Image
        </button>

        <img id="tree" src="Images\tree.jpg" style="width:100px">
        <button onclick="document.getElementById('tree').src='Images/leaves.jpg'">
            Change Image
        </button>
        <p id="text">
            Text text text lorem ipsum 
        </p>
        <button onclick="changeColor()">
            Do Somethin
        </button>
        <button onclick="document.getElementById('text').style.color='black'">
            change back
        </button>
        <canvas id="canvas" width="200" height="200" style="background-color:beige;"> 
        </canvas>
        <button onclick="draw()">test</button>
        <br>
        <h2>Screwing with Zoom</h2>
        <img id="leaves" src="Images\testgif.gif">
        <button onclick="document.getElementById('leaves').style.filter='hue-rotate(90deg)'">
            Change Season
        </button>
        <button onclick="document.getElementById('leaves').style.filter='hue-rotate(0deg)'">
            Change Back
        </button>


        
    </body>
    
</html>
